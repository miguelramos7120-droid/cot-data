name: Update COT Data

on:
  schedule:
    - cron: '0 21 * * 5'   # Sexta 21:00 UTC (22:00 Lisboa)
    - cron: '0 10 * * 6'   # Sábado 10:00 UTC (backup se sexta falhou)
  workflow_dispatch:        # Botão manual no GitHub

jobs:
  update-cot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download COT from CFTC (com retries)
        run: |
          mkdir -p data
          SUCCESS=false

          for ATTEMPT in 1 2 3; do
            echo "=== Tentativa $ATTEMPT de 3 ==="

            HTTP_CODE=$(curl -sL --max-time 60 \
              -H "User-Agent: Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36" \
              -o data/deafut_new.txt \
              -w "%{http_code}" \
              "https://www.cftc.gov/dea/newcot/deafut.txt" 2>&1)

            echo "HTTP: $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              LINES=$(wc -l < data/deafut_new.txt)
              echo "Linhas: $LINES"

              if [ "$LINES" -gt 50 ]; then
                NEW_DATE=$(head -1 data/deafut_new.txt | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
                echo "Data COT novo: $NEW_DATE"

                OLD_DATE=""
                if [ -f data/deafut.txt ]; then
                  OLD_DATE=$(head -1 data/deafut.txt | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
                  echo "Data COT anterior: $OLD_DATE"
                fi

                if [ "$NEW_DATE" != "$OLD_DATE" ] || [ -z "$OLD_DATE" ]; then
                  mv data/deafut_new.txt data/deafut.txt
                  echo "$NEW_DATE" > data/last_update.txt
                  date -u '+%Y-%m-%d %H:%M UTC' >> data/last_update.txt
                  echo "NOVO" >> data/last_update.txt
                  echo "COT_DATE=$NEW_DATE" >> $GITHUB_ENV
                  echo "COT_STATUS=new" >> $GITHUB_ENV
                  SUCCESS=true
                  echo "✅ Dados NOVOS: $NEW_DATE"
                  break
                else
                  rm data/deafut_new.txt
                  echo "⏳ Mesma data ($NEW_DATE) — CFTC ainda nao publicou"
                  echo "COT_STATUS=same" >> $GITHUB_ENV
                  if [ "$ATTEMPT" -lt 3 ]; then
                    echo "A esperar 5 minutos..."
                    sleep 300
                  fi
                fi
              else
                echo "⚠️ Ficheiro com poucas linhas ($LINES)"
                rm -f data/deafut_new.txt
              fi
            else
              echo "⚠️ HTTP $HTTP_CODE"
              rm -f data/deafut_new.txt
              if [ "$ATTEMPT" -lt 3 ]; then
                echo "A esperar 5 minutos..."
                sleep 300
              fi
            fi
          done

          if [ "$SUCCESS" = "false" ]; then
            if [ -f data/deafut.txt ]; then
              OLD_DATE=$(head -1 data/deafut.txt | grep -oP '\d{4}-\d{2}-\d{2}' | head -1)
              echo "⚠️ Sem dados novos. Manter versao anterior: $OLD_DATE"
              echo "COT_DATE=$OLD_DATE" >> $GITHUB_ENV
              echo "$OLD_DATE" > data/last_update.txt
              date -u '+%Y-%m-%d %H:%M UTC' >> data/last_update.txt
              echo "SEM_ALTERACAO (feriado/atraso CFTC)" >> data/last_update.txt
            else
              echo "❌ Sem ficheiro COT"
              echo "COT_STATUS=failed" >> $GITHUB_ENV
            fi
          fi

      - name: Commit and push
        run: |
          git config user.name "COT Bot"
          git config user.email "bot@cot-data.github"
          git add data/

          if git diff --staged --quiet; then
            echo "Sem alteracoes"
          else
            STATUS="${{ env.COT_STATUS }}"
            DATE="${{ env.COT_DATE }}"
            if [ "$STATUS" = "new" ]; then
              git commit -m "COT novo: $DATE"
            else
              git commit -m "Tentativa $DATE (sem dados novos)"
            fi
            git push
          fi
